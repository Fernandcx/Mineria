<ion-content class="home-content">
  <div class="page-container">
    
    <div class="header-section">
      <div class="header-text">
        <h1 class="main-title">Mis Proyectos</h1>
        <p class="main-subtitle">{{ projects.length }} proyectos</p>
      </div>
      <button class="add-project-btn" routerLink="/tabs/tab2">
        <ion-icon name="add-outline"></ion-icon>
      </button>
    </div>

    <div class="projects-list">
      <div class="project-card" *ngFor="let p of projects">
        
        <div class="card-image-placeholder">
          <ion-icon name="cube-outline" class="placeholder-icon"></ion-icon>
          <span class="status-badge" [ngClass]="p.statusClass">{{ p.status }}</span>
        </div>
        
        <div class="card-body">
          <h2 class="project-title">{{ p.title }}</h2>
          <div class="project-meta">
            <span class="meta-item"><ion-icon name="pricetag-outline"></ion-icon> {{ p.area }}</span>
            <span class="meta-item"><ion-icon name="calendar-outline"></ion-icon> {{ p.dateStr }}</span>
          </div>
          
          <div class="card-actions">
            <button class="action-btn btn-primary" routerLink="/editor">
              <ion-icon name="eye-outline"></ion-icon>
              Ver
            </button>
            <button class="action-btn btn-secondary" routerLink="/editor" [queryParams]="{view: '3D'}">
              <ion-icon name="cube-outline"></ion-icon>
              3D
            </button>
          </div>
        </div>
        
      </div>
    </div>
    
  </div>
</ion-content>
